<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Kairos">
  <!-- Kubernetes helm: 6-spoke wheel -->
  <g fill="none" stroke="#3949ab" stroke-width="1.1" stroke-linecap="round" opacity="0.55">
    <circle cx="24" cy="22" r="14.5"/>
    <line x1="24" y1="22" x2="24" y2="7.5"/>
    <line x1="24" y1="22" x2="36.6" y2="15.5"/>
    <line x1="24" y1="22" x2="36.6" y2="28.5"/>
    <line x1="24" y1="22" x2="24" y2="36.5"/>
    <line x1="24" y1="22" x2="11.4" y2="28.5"/>
    <line x1="24" y1="22" x2="11.4" y2="15.5"/>
  </g>

  <!-- Wing -->
  <g fill="#00bcd4">
    <path d="M8 17 C12 14, 17 13, 21 14 C17 16, 14 19, 12 21 C10 19, 8 17, 8 17 Z" opacity="0.45"/>
    <path d="M6 21 C11 18, 17 17, 22 19 C18 21, 15 24, 13 26 C10 24, 7 22, 6 21 Z"/>
  </g>

  <!-- K stem -->
  <rect x="15" y="9" width="3" height="26" rx="0.5" fill="#1a237e"/>

  <!-- Hourglass -->
  <path
    fill="#1a237e"
    d="M18 9 L33 9 L26 22 L33 35 L18 35 L24 22 Z"
  />

  <!-- K arms -->
  <path
    fill="none"
    stroke="#00bcd4"
    stroke-width="1.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    d="M18 22 L33 9 M18 22 L33 35"
  />

  <!-- Opportune moment pivot -->
  <circle cx="24" cy="22" r="1.8" fill="#00bcd4"/>
  <circle cx="24" cy="22" r="0.75" fill="#1a237e"/>
</svg>
