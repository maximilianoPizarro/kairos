# This rule is not used by the project kairos itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kairos.maximilianopizarro.github.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kairos
    app.kubernetes.io/managed-by: kustomize
  name: smartscalingpolicy-editor-role
rules:
- apiGroups:
  - kairos.maximilianopizarro.github.io
  resources:
  - smartscalingpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kairos.maximilianopizarro.github.io
  resources:
  - smartscalingpolicies/status
  verbs:
  - get
