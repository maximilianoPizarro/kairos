apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kairos-validating-webhook
  labels:
    app.kubernetes.io/name: kairos-operator
    app.kubernetes.io/component: webhook
webhooks:
  - name: validate-smartscalingpolicy.kairos.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: kairos-webhook-service
        namespace: kairos-system
        path: /validate-kairos
    rules:
      - apiGroups: ["kairos.maximilianopizarro.github.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["smartscalingpolicies"]
    sideEffects: None
    failurePolicy: Fail
  - name: validate-kairosagent.kairos.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: kairos-webhook-service
        namespace: kairos-system
        path: /validate-kairos
    rules:
      - apiGroups: ["kairos.maximilianopizarro.github.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["kairosagents"]
    sideEffects: None
    failurePolicy: Fail
---
apiVersion: v1
kind: Service
metadata:
  name: kairos-webhook-service
  namespace: kairos-system
  labels:
    app.kubernetes.io/name: kairos-operator
    app.kubernetes.io/component: webhook
spec:
  ports:
    - port: 443
      targetPort: 9443
      protocol: TCP
  selector:
    control-plane: controller-manager
