kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosAgent",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kairos-operator"
            },
            "name": "agent-dev-environments",
            "namespace": "kairos-system"
          },
          "spec": {
            "aiModel": {
              "apiKeySecret": {
                "key": "token",
                "name": "kairos-ai-credentials"
              },
              "apiURL": "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions",
              "model": "granite-31-8b",
              "timeoutSeconds": 30
            },
            "correctionPolicy": {
              "dryRun": false,
              "maxActionsPerHour": 50,
              "rollbackOnFailure": true
            },
            "mode": "autopilot",
            "paused": false,
            "reporting": {
              "interval": "60s"
            },
            "watch": {
              "namespaceSuffix": "-dev",
              "namespaces": [],
              "resourceTypes": [
                "Deployment"
              ]
            }
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosAgent",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kairos-operator"
            },
            "name": "agent-production",
            "namespace": "kairos-system"
          },
          "spec": {
            "aiModel": {
              "apiKeySecret": {
                "key": "token",
                "name": "kairos-ai-credentials"
              },
              "apiURL": "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions",
              "model": "granite-31-8b",
              "temperature": "0.3",
              "timeoutSeconds": 60
            },
            "correctionPolicy": {
              "dryRun": false,
              "maxActionsPerHour": 10,
              "requireApprovalAbove": "50%",
              "rollbackOnFailure": true
            },
            "mode": "supervised",
            "paused": false,
            "reporting": {
              "interval": "30s",
              "otelExport": true
            },
            "watch": {
              "labelSelector": "kairos.io/managed=true",
              "namespaceSuffix": "-prod",
              "namespaces": [
                "industrial-edge-tst",
                "factory-kafka"
              ],
              "resourceTypes": [
                "Deployment",
                "StatefulSet"
              ]
            }
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosAgent",
          "metadata": {
            "name": "agent-qa-environments",
            "namespace": "kairos-system"
          },
          "spec": {
            "aiModel": {
              "apiKeySecret": {
                "key": "token",
                "name": "kairos-ai-credentials"
              },
              "apiURL": "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions",
              "model": "granite-31-8b"
            },
            "correctionPolicy": {
              "maxActionsPerHour": 20,
              "requireApprovalAbove": "30%",
              "rollbackOnFailure": true
            },
            "mode": "supervised",
            "reporting": {
              "interval": "45s"
            },
            "watch": {
              "namespaceSuffix": "-qa",
              "namespaces": [],
              "resourceTypes": [
                "Deployment",
                "StatefulSet"
              ]
            }
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosConsole",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kairos-operator"
            },
            "name": "kairos-console",
            "namespace": "kairos-system"
          },
          "spec": {
            "auth": {
              "type": "openshift-oauth"
            },
            "clusters": [
              {
                "apiURL": "https://api.cluster-hub.openshiftapps.com:6443",
                "name": "hub",
                "region": "central"
              },
              {
                "apiURL": "https://api.cluster-east.openshiftapps.com:6443",
                "name": "east",
                "region": "east"
              },
              {
                "apiURL": "https://api.cluster-west.openshiftapps.com:6443",
                "name": "west",
                "region": "west"
              }
            ],
            "image": "quay.io/maximilianopizarro/kairos-console:v1.0.0",
            "replicas": 1,
            "route": {
              "enabled": true,
              "host": "kairos-console-kairos-system.apps.cluster-example.openshiftapps.com",
              "tlsEnabled": true
            }
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "SmartScalingPolicy",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kairos-operator"
            },
            "name": "industrial-edge-policy",
            "namespace": "kairos-system"
          },
          "spec": {
            "ai": {
              "enabled": false
            },
            "otelEndpoint": "otel-collector.observability.svc.cluster.local:4317",
            "paused": false,
            "prometheusEndpoint": "prometheus-k8s.openshift-monitoring.svc.cluster.local:9090",
            "rules": [
              {
                "action": {
                  "cooldown": "5m",
                  "increaseCPUPercent": 25,
                  "increaseMemoryPercent": 20,
                  "maxCPU": "2",
                  "maxMemory": "2Gi",
                  "type": "IncreaseResources"
                },
                "name": "high-cpu-vertical",
                "when": {
                  "for": "3m",
                  "metric": "container_cpu_usage_seconds_total",
                  "operator": "GreaterThan",
                  "threshold": "80"
                }
              },
              {
                "action": {
                  "cooldown": "5m",
                  "increaseMemoryPercent": 30,
                  "maxMemory": "4Gi",
                  "type": "IncreaseResources"
                },
                "name": "memory-pressure-vertical",
                "when": {
                  "for": "2m",
                  "metric": "container_memory_working_set_bytes",
                  "operator": "GreaterThan",
                  "threshold": "85"
                }
              },
              {
                "action": {
                  "cooldown": "10m",
                  "maxReplicas": 6,
                  "replicas": 1,
                  "type": "AddReplicas"
                },
                "name": "request-rate-horizontal",
                "when": {
                  "for": "1m",
                  "metric": "http_server_requests_per_second",
                  "operator": "GreaterThan",
                  "threshold": "1000"
                }
              },
              {
                "action": {
                  "cooldown": "30m",
                  "increaseCPUPercent": 20,
                  "minCPU": "100m",
                  "type": "DecreaseResources"
                },
                "name": "low-utilization-downscale",
                "when": {
                  "for": "15m",
                  "metric": "container_cpu_usage_seconds_total",
                  "operator": "LessThan",
                  "threshold": "20"
                }
              }
            ],
            "schedule": [
              {
                "action": {
                  "minReplicas": 3,
                  "type": "SetMinReplicas"
                },
                "cron": "0 8 * * 1-5",
                "name": "business-hours-preemptive"
              },
              {
                "action": {
                  "minReplicas": 1,
                  "type": "SetMinReplicas"
                },
                "cron": "0 20 * * 1-5",
                "name": "off-hours-scale-down"
              }
            ],
            "target": {
              "apiVersion": "apps/v1",
              "kind": "Deployment",
              "name": "line-dashboard",
              "namespace": "industrial-edge-tst"
            }
          }
        }
      ]
    capabilities: Basic Install
    createdAt: "2026-05-27T19:49:46Z"
