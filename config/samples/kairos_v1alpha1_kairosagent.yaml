apiVersion: kairos.maximilianopizarro.github.io/v1alpha1
kind: KairosAgent
metadata:
  name: agent-production
  namespace: kairos-system
  labels:
    app.kubernetes.io/managed-by: kairos-operator
spec:
  mode: supervised
  aiModel:
    apiURL: "https://isvc-granite-31-8b-fp8-predictor.sandbox-shared-models.svc.cluster.local:8443/v1/chat/completions"
    model: "granite-31-8b"
    apiKeySecret:
      name: kairos-ai-credentials
      key: token
    timeoutSeconds: 60
    temperature: "0.3"
  watch:
    # Option A: Explicit namespace list
    namespaces:
    - industrial-edge-tst
    - factory-kafka
    # Option B: Watch all namespaces ending with suffix (e.g. myapp-prod, orders-prod)
    namespaceSuffix: "-prod"
    resourceTypes:
    - Deployment
    - StatefulSet
    labelSelector: "kairos.io/managed=true"
  correctionPolicy:
    maxActionsPerHour: 10
    requireApprovalAbove: "50%"
    rollbackOnFailure: true
    dryRun: false
  reporting:
    interval: "30s"
    otelExport: true
  paused: false
---
apiVersion: kairos.maximilianopizarro.github.io/v1alpha1
kind: KairosAgent
metadata:
