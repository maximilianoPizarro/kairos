apiVersion: kairos.maximilianopizarro.github.io/v1alpha1
kind: KairosConsole
metadata:
  name: kairos-console
  namespace: kairos-system
spec:
  replicas: 1
  image: "quay.io/maximilianopizarro/kairos-console:v0.1.0"
  route:
    enabled: true
    host: "kairos.apps.hub.example.com"
    tlsEnabled: true
  auth:
    type: openshift-oauth
  clusters:
  - name: hub
    region: central
    apiURL: "https://api.hub.example.com:6443"
  - name: east
    region: east
    apiURL: "https://api.east.example.com:6443"
  - name: west
    region: west
    apiURL: "https://api.west.example.com:6443"
