# This rule is not used by the project kairos itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over kairos.maximilianopizarro.github.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kairos
    app.kubernetes.io/managed-by: kustomize
  name: smartscalingpolicy-admin-role
rules:
- apiGroups:
  - kairos.maximilianopizarro.github.io
  resources:
  - smartscalingpolicies
  verbs:
  - '*'
- apiGroups:
  - kairos.maximilianopizarro.github.io
  resources:
  - smartscalingpolicies/status
  verbs:
  - get
