apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: kairos-operator.v2.0.0
  namespace: placeholder
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosAgent",
          "metadata": {"name": "example-agent", "namespace": "kairos-system"},
          "spec": {
            "mode": "supervised",
            "aiModel": {"apiURL": "http://localhost:11434/v1", "model": "llama3"},
            "watch": {"namespaces": ["default"], "resourceTypes": ["Deployment"]},
            "correctionPolicy": {"maxActionsPerHour": 10, "dryRun": true},
            "reporting": {"interval": "30s"}
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosConsole",
          "metadata": {"name": "kairos", "namespace": "kairos-system"},
          "spec": {
            "replicas": 1,
            "image": "quay.io/maximilianopizarro/kairos-console:v2.0.0",
            "route": {"enabled": true},
            "auth": {"type": "none"}
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "SmartScalingPolicy",
          "metadata": {"name": "example-policy", "namespace": "kairos-system"},
          "spec": {
            "target": {"apiVersion": "apps/v1", "kind": "Deployment", "name": "my-app", "namespace": "default"},
            "rules": [
              {
                "name": "cpu-high",
                "when": {"metric": "container_cpu_usage_seconds_total", "operator": "GreaterThan", "threshold": "80%", "for": "5m"},
                "action": {"type": "IncreaseResources", "increaseCPUPercent": 25, "cooldown": "10m"}
              }
            ]
          }
        },
        {
          "apiVersion": "kairos.maximilianopizarro.github.io/v1alpha1",
          "kind": "KairosEvent",
          "metadata": {"name": "example-event", "namespace": "kairos-system"},
          "spec": {
            "agentName": "my-agent",
            "cluster": "hub",
            "action": "scale_up",
            "resource": "my-app",
            "namespace": "default",
            "reason": "CPU utilization exceeded 80% threshold"
          }
        }
      ]
    capabilities: Full Lifecycle
    categories: "AI/Machine Learning, Monitoring"
    description: "AI-powered Kubernetes resource optimizer with SSA, ArgoCD-safe, multi-cluster governance"
    repository: "https://github.com/maximilianoPizarro/kairos"
    containerImage: "quay.io/maximilianopizarro/kairos-operator:v2.0.0"
    createdAt: "2026-05-27T00:00:00Z"
    support: "maximilianopizarro"
    operators.operatorframework.io/builder: operator-sdk-v1.34.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    operatorframework.io/suggested-namespace: kairos-system
spec:
  displayName: Kairos Operator
  description: |
    ## Kairos Operator — Intelligent Resource Management

    Kairos is a Kubernetes operator that uses AI models to continuously analyze workload
    metrics and automatically right-size container resources using **Server-Side Apply (SSA)**,
    ensuring **zero conflicts with ArgoCD** and other GitOps controllers.

    ### Why Kairos?

    | Feature | Kairos | VPA | HPA |
    |---------|--------|-----|-----|
    | ArgoCD-safe (SSA) | Yes | No | N/A |
    | AI-powered decisions | Yes | No | No |
    | Multi-cluster governance | Yes | No | No |
    | Dry-run mode | Yes | Yes | No |
    | Approval workflows | Yes | No | No |
    | GitOps PR generation | Yes | No | No |

    ### Key Features

    * **AI-Powered Recommendations** — Connects to any OpenAI-compatible API (OpenAI, Ollama, vLLM, etc.)
    * **Server-Side Apply** — Zero-conflict resource management, fully compatible with ArgoCD
    * **Multi-Cluster Hub-Spoke** — Central console for governance across all clusters
    * **4 Operating Modes** — Autopilot, Supervised, GitOps, or Dry-Run
    * **HPA/KEDA/VPA Coexistence** — Automatic detection and deferral to avoid conflicts
    * **PinnedResources** — SRE can lock workload resources for a set duration
    * **KairosEvent Audit Trail** — Full history of every scaling decision
    * **Approval Workflows** — Supervised mode with approve/reject in console UI
    * **Policy Inheritance** — Global > Cluster > Namespace scope with priority-based resolution
    * **Cost Estimation** — Integrate with AWS/GCP/Azure pricing APIs
    * **Notification Webhooks** — Slack, Teams, or generic webhook alerts on corrections
    * **Predictive Scaling** — Time-series forecasting for proactive resource adjustment
    * **GitOps Native** — Generate PRs to your infrastructure repo instead of direct patches
    * **Grafana Dashboard** — Pre-built dashboard for operator observability
    * **ValidatingWebhook** — Pre-apply validation prevents misconfigurations

    ### Architecture

    ```
    ┌─────────────────────────────────────────────────────────┐
    │                     Hub Cluster                          │
    │  ┌──────────────┐  ┌─────────────┐  ┌──────────────┐   │
    │  │   Kairos     │  │   Kairos    │  │  SmartScaling │   │
    │  │  Operator    │──│   Console   │  │   Policies    │   │
    │  └──────────────┘  └─────────────┘  └──────────────┘   │
    └───────────┬─────────────────────────────────────────────┘
                │  Agent Reports (mTLS)
    ┌───────────┼──────────────────────────────────────────┐
    │    ┌──────▼──────┐         ┌──────────────┐          │
    │    │ KairosAgent │ ──────► │  Workloads   │          │
    │    │  (east)     │  SSA    │  (annotated) │          │
    │    └─────────────┘         └──────────────┘          │
    │                    Spoke Cluster                       │
    └──────────────────────────────────────────────────────┘
    ```

    ### Prerequisites

    * OpenShift 4.12+ or Kubernetes 1.25+
    * (Optional) AI model endpoint — OpenAI, Ollama, vLLM, or any compatible API
    * (Optional) Prometheus/Thanos for metrics collection

    ### Quick Start

    1. Install the operator from OperatorHub
    2. A default `KairosConsole` is created automatically with a Route
    3. Create a `KairosAgent` to start monitoring workloads
    4. Annotate target workloads with `kairos.io/managed: "true"`
    5. View recommendations in the Kairos Console

    ### Supported Resource Types

    * Deployments
    * StatefulSets
    * DaemonSets
    * CronJobs

    ### Documentation

    Full documentation available at [maximilianopizarro.github.io/kairos](https://maximilianopizarro.github.io/kairos/)

  version: 2.0.0
  replaces: kairos-operator.v1.1.0
  maturity: beta
  minKubeVersion: "1.25.0"
  keywords:
    - kubernetes
    - autoscaling
    - ai
    - resource-management
    - openshift
    - machine-learning
    - cost-optimization
    - gitops
    - ssa
    - argocd
  maintainers:
    - name: Maximiliano Pizarro
      email: maximilianopizarro5@gmail.com
  provider:
    name: maximilianopizarro
    url: https://github.com/maximilianoPizarro
  links:
    - name: GitHub
      url: https://github.com/maximilianoPizarro/kairos
    - name: Documentation
      url: https://maximilianopizarro.github.io/kairos/
    - name: Roadmap
      url: https://github.com/maximilianoPizarro/kairos/blob/main/ROADMAP.md
    - name: Grafana Dashboard
      url: https://github.com/maximilianoPizarro/kairos/tree/main/config/grafana
  icon:
    - base64data: 
      mediatype: image/svg+xml
  install:
    strategy: deployment
    spec:
      deployments:
        - name: kairos-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            template:
              metadata:
                labels:
                  control-plane: controller-manager
              spec:
                serviceAccountName: kairos-controller-manager
                terminationGracePeriodSeconds: 10
                securityContext:
                  runAsNonRoot: true
                containers:
                  - name: manager
                    image: quay.io/maximilianopizarro/kairos-operator:v2.0.0
                    imagePullPolicy: Always
                    command: ["/manager"]
                    args: ["--leader-elect"]
                    env:
                      - name: POD_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                    ports:
                      - containerPort: 8080
                        name: metrics
                        protocol: TCP
                      - containerPort: 8081
                        name: health
                        protocol: TCP
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 100m
                        memory: 128Mi
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
      permissions:
        - serviceAccountName: kairos-controller-manager
          rules:
            - apiGroups: [""]
              resources: ["configmaps"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create", "patch"]
      clusterPermissions:
        - serviceAccountName: kairos-controller-manager
          rules:
            - apiGroups: ["kairos.maximilianopizarro.github.io"]
              resources: ["kairosagents", "kairosagents/status", "kairosagents/finalizers"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["kairos.maximilianopizarro.github.io"]
              resources: ["kairosconsoles", "kairosconsoles/status", "kairosconsoles/finalizers"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["kairos.maximilianopizarro.github.io"]
              resources: ["smartscalingpolicies", "smartscalingpolicies/status", "smartscalingpolicies/finalizers"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["kairos.maximilianopizarro.github.io"]
              resources: ["kairosevents"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["apps"]
              resources: ["deployments", "statefulsets", "daemonsets"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["batch"]
              resources: ["cronjobs"]
              verbs: ["get", "list", "watch", "patch"]
            - apiGroups: [""]
              resources: ["pods", "services", "serviceaccounts", "configmaps", "secrets", "namespaces"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create", "patch"]
            - apiGroups: ["autoscaling"]
              resources: ["horizontalpodautoscalers"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["route.openshift.io"]
              resources: ["routes"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch", "create", "update", "patch"]
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  customresourcedefinitions:
    owned:
      - name: kairosagents.kairos.maximilianopizarro.github.io
        version: v1alpha1
        kind: KairosAgent
        displayName: Kairos Agent
        description: AI-powered resource management agent that monitors and optimizes workloads
        specDescriptors:
          - path: mode
            description: Operating mode (autopilot, supervised, or gitops)
            displayName: Mode
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:select:autopilot
              - urn:alm:descriptor:com.tectonic.ui:select:supervised
              - urn:alm:descriptor:com.tectonic.ui:select:gitops
          - path: aiModel.apiURL
            description: OpenAI-compatible API endpoint URL
            displayName: AI API URL
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: aiModel.model
            description: AI model identifier (e.g. gpt-4, llama3)
            displayName: AI Model
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: correctionPolicy.maxActionsPerHour
            description: Maximum number of corrections allowed per hour
            displayName: Max Actions/Hour
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:number
          - path: correctionPolicy.dryRun
            description: Enable dry-run mode (no actual changes applied)
            displayName: Dry Run
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - path: paused
            description: Pause the agent
            displayName: Paused
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - path: slaClass
            description: Priority class for SLA-aware scheduling
            displayName: SLA Class
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
        statusDescriptors:
          - path: phase
            description: Current phase of the agent
            displayName: Phase
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: watchedResources
            description: Number of resources being watched
            displayName: Watched Resources
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:number
          - path: totalCorrections
            description: Total corrections applied
            displayName: Total Corrections
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:number
      - name: kairosconsoles.kairos.maximilianopizarro.github.io
        version: v1alpha1
        kind: KairosConsole
        displayName: Kairos Console
        description: Multi-cluster governance dashboard with approval workflows and historical charts
        specDescriptors:
          - path: replicas
            description: Number of console replicas
            displayName: Replicas
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:podCount
          - path: image
            description: Console container image
            displayName: Image
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: route.enabled
            description: Create an OpenShift Route automatically
            displayName: Route Enabled
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - path: auth.type
            description: Authentication type (none, openshift-oauth, token)
            displayName: Auth Type
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:select:none
              - urn:alm:descriptor:com.tectonic.ui:select:openshift-oauth
              - urn:alm:descriptor:com.tectonic.ui:select:token
        statusDescriptors:
          - path: url
            description: Console URL (auto-assigned by OpenShift Route)
            displayName: URL
            x-descriptors:
              - urn:alm:descriptor:org.w3:link
          - path: readyReplicas
            description: Ready replicas
            displayName: Ready
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:podStatuses
      - name: smartscalingpolicies.kairos.maximilianopizarro.github.io
        version: v1alpha1
        kind: SmartScalingPolicy
        displayName: Smart Scaling Policy
        description: Metric-based scaling policy with AI integration, policy inheritance, and predictive scaling
        specDescriptors:
          - path: target.kind
            description: Target workload kind
            displayName: Target Kind
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:select:Deployment
              - urn:alm:descriptor:com.tectonic.ui:select:StatefulSet
              - urn:alm:descriptor:com.tectonic.ui:select:DaemonSet
          - path: target.name
            description: Target workload name
            displayName: Target Name
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: scope
            description: Policy scope for inheritance
            displayName: Scope
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:select:global
              - urn:alm:descriptor:com.tectonic.ui:select:cluster
              - urn:alm:descriptor:com.tectonic.ui:select:namespace
          - path: paused
            description: Pause all scaling actions
            displayName: Paused
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - path: predictiveScaling.enabled
            description: Enable predictive scaling
            displayName: Predictive Scaling
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        statusDescriptors:
          - path: conditions
            description: Current conditions
            displayName: Conditions
            x-descriptors:
              - urn:alm:descriptor:io.kubernetes.conditions
      - name: kairosevents.kairos.maximilianopizarro.github.io
        version: v1alpha1
        kind: KairosEvent
        displayName: Kairos Event
        description: Audit trail for scaling decisions — records every action taken by agents
        specDescriptors:
          - path: agentName
            description: Agent that generated the event
            displayName: Agent
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: action
            description: Action taken
            displayName: Action
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: dryRun
            description: Whether this was a dry-run event
            displayName: Dry Run
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
  nativeAPIs:
    - group: apps
      version: v1
      kind: Deployment
    - group: apps
      version: v1
      kind: StatefulSet
    - group: apps
      version: v1
      kind: DaemonSet
    - group: batch
      version: v1
      kind: CronJob
    - group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
    - group: route.openshift.io
      version: v1
      kind: Route
