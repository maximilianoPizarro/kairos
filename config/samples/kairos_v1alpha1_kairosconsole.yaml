apiVersion: kairos.maximilianopizarro.github.io/v1alpha1
kind: KairosConsole
metadata:
  name: kairos
  namespace: kairos-system
  labels:
    app.kubernetes.io/managed-by: kairos-operator
spec:
  replicas: 1
  image: "quay.io/maximilianopizarro/kairos-console:latest"
  route:
    enabled: true
    host: "kairos-console.apps.your-cluster.example.com"
    tlsEnabled: true
  # Default: no authentication (first setup / development)
  auth:
    type: none
  clusters:
  - name: hub
    region: central
    apiURL: "https://api.hub-cluster:6443"
---
