name: Deploy GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Pages
      uses: actions/configure-pages@v5
      with:
        enablement: true

    - name: Build documentation site
      run: |
        mkdir -p _site/images
        cp docs/pages/index.html _site/
        cp -r docs/pages/images/* _site/images/ 2>/dev/null || true
        cp -r docs/images/* _site/images/ 2>/dev/null || true
        cp docs/argocd-coexistence.md _site/ 2>/dev/null || true
        cp README.md _site/

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
